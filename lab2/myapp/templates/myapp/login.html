{% extends 'myapp/base.html' %}

{% block content %}
<div class="forum-page-header">
    <div>
        <h1>Увійти</h1>
        <p class="page-description">Авторизація користувача.</p>
    </div>

    <a href="{% url 'home' %}" class="back-btn">На головну</a>
</div>

<section class="reply-box">
    <form method="post" class="forum-form">
        {% csrf_token %}

        {% if form.errors %}
            <div class="comment-item">
                {{ form.errors }}
            </div>
        {% endif %}

        <div class="form-group">
            <label for="{{ form.username.id_for_label }}">Логін</label>
            {{ form.username }}
        </div>

        <div class="form-group">
            <label for="{{ form.password.id_for_label }}">Пароль</label>
            {{ form.password }}
        </div>

        <button type="submit" class="add-topic-btn">Увійти</button>
    </form>

    <div style="margin-top: 16px;">
        <a href="{% url 'password_reset_request_view' %}" class="back-btn">Забув пароль</a>
    </div>
</section>
{% endblock %}
