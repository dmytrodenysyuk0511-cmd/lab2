{% extends 'myapp/base.html' %}

{% block content %}
<div class="forum-page-header">
    <div>
        <h1>Зареєструватись</h1>
        <p class="page-description">Створи акаунт для форуму та магазину.</p>
    </div>

    <a href="{% url 'home' %}" class="back-btn">На головну</a>
</div>

<section class="reply-box">
    <form method="post" class="forum-form">
        {% csrf_token %}

        {% if form.errors %}
            <div class="comment-item">
                {{ form.errors }}
            </div>
        {% endif %}

        <div class="form-group">
            <label for="{{ form.username.id_for_label }}">Логін</label>
            {{ form.username }}
        </div>

        <div class="form-group">
            <label for="{{ form.email.id_for_label }}">Email</label>
            {{ form.email }}
        </div>

        <div class="form-group">
            <label for="{{ form.password1.id_for_label }}">Пароль</label>
            {{ form.password1 }}
        </div>

        <div class="form-group">
            <label for="{{ form.password2.id_for_label }}">Повторіть пароль</label>
            {{ form.password2 }}
        </div>

        <button type="submit" class="add-topic-btn">Зареєструватись</button>
    </form>
</section>
{% endblock %}
