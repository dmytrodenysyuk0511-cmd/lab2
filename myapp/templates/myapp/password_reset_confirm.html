{% extends 'myapp/base.html' %}

{% block content %}
<div class="forum-page-header">
    <div>
        <h1>Підтвердження коду</h1>
        <p class="page-description">Введи код із email і новий пароль.</p>
    </div>

    <a href="{% url 'home' %}" class="back-btn">На головну</a>
</div>

<section class="reply-box">
    <form method="post" class="forum-form">
        {% csrf_token %}

        <div class="form-group">
            <label for="{{ form.email.id_for_label }}">Email</label>
            {{ form.email }}
        </div>

        <div class="form-group">
            <label for="{{ form.code.id_for_label }}">Тимчасовий код</label>
            {{ form.code }}
        </div>

        <div class="form-group">
            <label for="{{ form.new_password1.id_for_label }}">Новий пароль</label>
            {{ form.new_password1 }}
        </div>

        <div class="form-group">
            <label for="{{ form.new_password2.id_for_label }}">Повтори пароль</label>
            {{ form.new_password2 }}
        </div>

        <button type="submit" class="add-topic-btn">Змінити пароль</button>
    </form>
</section>
{% endblock %}
