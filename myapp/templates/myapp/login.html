{% extends 'myapp/base.html' %}

{% block content %}
<style>
    .login-container {
        max-width: 500px;
        margin: 50px auto;
    }

    .login-card {
        background: white;
        border-radius: 30px;
        padding: 40px;
        box-shadow: 0 20px 60px rgba(102, 126, 234, 0.3);
        border: 2px solid #e0e7ff;
    }

    .login-header {
        text-align: center;
        margin-bottom: 30px;
    }

    .login-header h1 {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        font-size: 42px;
        margin-bottom: 10px;
    }

    .login-icon {
        font-size: 64px;
        margin-bottom: 20px;
    }

    .form-group input {
        border: 2px solid #e0e7ff;
        transition: all 0.3s ease;
    }

    .form-group input:focus {
        border-color: #667eea;
        box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
    }

    .login-btn {
        width: 100%;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 15px;
        border: none;
        border-radius: 25px;
        font-size: 18px;
        font-weight: 700;
        cursor: pointer;
        box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        transition: all 0.3s ease;
    }

    .login-btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 15px 40px rgba(102, 126, 234, 0.5);
    }

    .login-links {
        text-align: center;
        margin-top: 20px;
        display: flex;
        gap: 15px;
        justify-content: center;
        flex-wrap: wrap;
    }

    .login-links a {
        color: #667eea;
        font-weight: 600;
        transition: all 0.3s ease;
    }

    .login-links a:hover {
        color: #764ba2;
        transform: scale(1.05);
    }

    .error-box {
        background: linear-gradient(135deg, #fee 0%, #fdd 100%);
        border: 2px solid #fcc;
        border-radius: 15px;
        padding: 15px;
        margin-bottom: 20px;
        color: #c33;
    }
</style>

<div class="login-container">
    <div class="login-card">
        <div class="login-header">
            <div class="login-icon">🔐</div>
            <h1>Вхід</h1>
            <p style="color: #667eea;">Авторизація користувача</p>
        </div>

        <form method="post" class="forum-form">
            {% csrf_token %}

            {% if form.errors %}
                <div class="error-box">
                    ❌ {{ form.errors }}
                </div>
            {% endif %}

            <div class="form-group">
                <label for="{{ form.username.id_for_label }}">👤 Логін</label>
                {{ form.username }}
            </div>

            <div class="form-group">
                <label for="{{ form.password.id_for_label }}">🔑 Пароль</label>
                {{ form.password }}
            </div>

            <button type="submit" class="login-btn">🚀 Увійти</button>
        </form>

        <div class="login-links">
            <a href="{% url 'password_reset_request_view' %}">🔄 Забув пароль</a>
            <span style="color: #ccc;">|</span>
            <a href="{% url 'register' %}">✨ Реєстрація</a>
            <span style="color: #ccc;">|</span>
            <a href="{% url 'home' %}">🏠 На головну</a>
        </div>
    </div>
</div>
{% endblock %}
